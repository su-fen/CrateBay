syntax = "proto3";
package cargobay;

service VMService {
  rpc CreateVM(CreateVMRequest) returns (CreateVMResponse);
  rpc StartVM(StartVMRequest) returns (StartVMResponse);
  rpc StopVM(StopVMRequest) returns (StopVMResponse);
  rpc DeleteVM(DeleteVMRequest) returns (DeleteVMResponse);
  rpc ListVMs(ListVMsRequest) returns (ListVMsResponse);
  rpc GetVMStatus(GetVMStatusRequest) returns (GetVMStatusResponse);
  rpc MountVirtioFS(MountVirtioFSRequest) returns (MountVirtioFSResponse);
  rpc UnmountVirtioFS(UnmountVirtioFSRequest) returns (UnmountVirtioFSResponse);
  rpc ListVirtioFSMounts(ListVirtioFSMountsRequest) returns (ListVirtioFSMountsResponse);
  rpc GetVMConsole(GetVMConsoleRequest) returns (GetVMConsoleResponse);
  rpc AddPortForward(AddPortForwardRequest) returns (AddPortForwardResponse);
  rpc RemovePortForward(RemovePortForwardRequest) returns (RemovePortForwardResponse);
  rpc ListPortForwards(ListPortForwardsRequest) returns (ListPortForwardsResponse);
  rpc GetVMStats(GetVMStatsRequest) returns (GetVMStatsResponse);
}

message CreateVMRequest {
  string name = 1;
  uint32 cpus = 2;
  uint64 memory_mb = 3;
  uint64 disk_gb = 4;
  bool rosetta = 5;
  repeated SharedDirectory shared_dirs = 6;
}

message CreateVMResponse {
  string vm_id = 1;
}

message StartVMRequest {
  string vm_id = 1;
}

message StartVMResponse {}

message StopVMRequest {
  string vm_id = 1;
}

message StopVMResponse {}

message DeleteVMRequest {
  string vm_id = 1;
}

message DeleteVMResponse {}

message ListVMsRequest {}

message ListVMsResponse {
  repeated VMInfo vms = 1;
}

message GetVMStatusRequest {
  string vm_id = 1;
}

message GetVMStatusResponse {
  string vm_id = 1;
  string status = 2;
  bool rosetta_enabled = 3;
  repeated SharedDirectory shared_dirs = 4;
  uint64 disk_gb = 5;
  repeated PortForwardEntry port_forwards = 6;
}

message VMInfo {
  string vm_id = 1;
  string name = 2;
  string status = 3;
  uint32 cpus = 4;
  uint64 memory_mb = 5;
  bool rosetta_enabled = 6;
  repeated SharedDirectory shared_dirs = 7;
  uint64 disk_gb = 8;
  repeated PortForwardEntry port_forwards = 9;
}

message PortForwardEntry {
  uint32 host_port = 1;
  uint32 guest_port = 2;
  string protocol = 3;
}

message SharedDirectory {
  string tag = 1;
  string host_path = 2;
  string guest_path = 3;
  bool read_only = 4;
}

message MountVirtioFSRequest {
  string vm_id = 1;
  SharedDirectory share = 2;
}

message MountVirtioFSResponse {}

message UnmountVirtioFSRequest {
  string vm_id = 1;
  string tag = 2;
}

message UnmountVirtioFSResponse {}

message ListVirtioFSMountsRequest {
  string vm_id = 1;
}

message ListVirtioFSMountsResponse {
  repeated SharedDirectory mounts = 1;
}

message GetVMConsoleRequest {
  string vm_id = 1;
  uint64 offset = 2;
}

message GetVMConsoleResponse {
  string data = 1;
  uint64 new_offset = 2;
}

message AddPortForwardRequest {
  string vm_id = 1;
  uint32 host_port = 2;
  uint32 guest_port = 3;
  string protocol = 4;
}

message AddPortForwardResponse {}

message RemovePortForwardRequest {
  string vm_id = 1;
  uint32 host_port = 2;
}

message RemovePortForwardResponse {}

message ListPortForwardsRequest {
  string vm_id = 1;
}

message ListPortForwardsResponse {
  repeated PortForwardEntry forwards = 1;
}

message GetVMStatsRequest {
  string vm_id = 1;
}

message GetVMStatsResponse {
  string vm_id = 1;
  double cpu_percent = 2;
  uint64 memory_usage_mb = 3;
  uint64 disk_usage_gb = 4;
}
